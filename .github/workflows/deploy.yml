name: Deploy LegendaPro → Vercel

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_kZTmEoVpVC1gITFZZy7d6oQ8
          VERCEL_PROJECT_ID: prj_zaUcym70TuKcNDqAaGy61iJqEXG0
