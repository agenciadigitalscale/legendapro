<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criativo de anúncio — LegendaPro (uso interno)</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,700;1,800&family=Caveat:wght@700&family=Montserrat:ital,wght@0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: #111114; color: #f0f0f2; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 18px; }
  h1 { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
  h1 span { color: #00d9ff; }
  .sub { font-size: 12px; color: #9a9aa3; margin-bottom: 14px; text-align: center; }
  canvas { height: min(72vh, 760px); aspect-ratio: 9/16; border-radius: 14px; background: #08090c; display: block; }
  .bar { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
  button {
    font-family: inherit; font-weight: 800; font-size: 14px; border: none;
    border-radius: 10px; padding: 12px 18px; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: wait; }
  .b1 { background: #2a2a31; color: #fff; }
  .b2 { background: linear-gradient(90deg, #00d9ff, #00ffa3); color: #04151c; }
  #status { font-size: 13px; color: #9a9aa3; margin-top: 10px; min-height: 18px; text-align: center; }
</style>
</head>
<body>
<h1>Criativo 9:16 — <span>LegendaPro</span> (30s)</h1>
<p class="sub">Página de uso interno. O vídeo sai sem áudio — adicione a música/trend no CapCut ou no próprio Instagram.</p>
<canvas id="cv" width="1080" height="1920"></canvas>
<div class="bar">
  <button class="b1" id="btnPlay">&#9654; Assistir</button>
  <button class="b2" id="btnMp4">&#9210; Baixar MP4 (30s)</button>
  <button class="b1" id="btnWebm">Baixar WebM</button>
</div>
<p id="status"></p>

<script>
const W = 1080, H = 1920, DUR = 30;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function clamp01(x){ return Math.max(0, Math.min(1, x)); }
function eo(t){ return 1 - Math.pow(1 - t, 2); }
function eb(t){ const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); }
function st(p, i, n, s){ s = s || 0.16; return clamp01(p * (1 + (n - 1) * s) - i * s); }
function pop(q){ return { alpha: Math.min(q * 3, 1), scale: q <= 0 ? 0 : eb(q) }; }

function T(c, s, y, o){
  o = o || {};
  if ((o.alpha !== undefined && o.alpha <= 0) || o.scale === 0) return;
  c.save();
  c.translate(W / 2 + (o.dx || 0), y);
  if (o.rot) c.rotate(o.rot * Math.PI / 180);
  c.globalAlpha = o.alpha === undefined ? 1 : o.alpha;
  const sc = o.scale === undefined ? 1 : o.scale;
  c.scale(sc, sc);
  const size = o.size || 60;
  c.font = (o.it ? 'italic ' : '') + (o.w || 800) + ' ' + size + 'px "' + (o.f || 'Montserrat') + '"';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  if ('letterSpacing' in c) c.letterSpacing = (o.sp || 0) + 'px';
  if (o.color === 'grad'){
    const m = c.measureText(s);
    const g = c.createLinearGradient(-m.width / 2, 0, m.width / 2, 0);
    g.addColorStop(0, '#00d9ff'); g.addColorStop(1, '#00ffa3');
    c.fillStyle = g;
  } else {
    c.fillStyle = o.color || '#ffffff';
  }
  c.fillText(s, 0, 0);
  c.restore();
}

function bgGlow(c, t){
  c.clearRect(0, 0, W, H);
  c.fillStyle = '#08090c';
  c.fillRect(0, 0, W, H);
  let g = c.createRadialGradient(W * 0.85 + Math.sin(t * 0.4) * 70, 260 + Math.cos(t * 0.3) * 90, 0, W * 0.85, 260, 700);
  g.addColorStop(0, 'rgba(0,217,255,0.15)'); g.addColorStop(1, 'rgba(0,217,255,0)');
  c.fillStyle = g; c.fillRect(0, 0, W, H);
  g = c.createRadialGradient(W * 0.12 + Math.cos(t * 0.35) * 60, H - 300 + Math.sin(t * 0.45) * 80, 0, W * 0.12, H - 300, 650);
  g.addColorStop(0, 'rgba(37,99,235,0.16)'); g.addColorStop(1, 'rgba(37,99,235,0)');
  c.fillStyle = g; c.fillRect(0, 0, W, H);
}

const P = { c1:'#ffffff', c2:'#00d9ff', c3:'#00ffa3', dark:'#0a1418' };
const MODELOS = [
  { anim:'fade', lines:[
    { f:'Archivo Black', s:92, c:'c1', d:'como fazer' },
    { f:'Playfair Display', s:170, it:1, w:800, c:'c1', d:'legenda', gap:-6 },
    { f:'Archivo Black', s:118, c:'c1', d:'atrativa', gap:-52 },
    { f:'Montserrat', s:44, w:700, c:'c1', d:'sem perder tempo', gap:10 } ]},
  { anim:'fade', lines:[
    { f:'Playfair Display', s:95, it:1, w:700, c:'c1', d:'esse', dx:150 },
    { f:'Playfair Display', s:200, it:1, w:800, c:'c3', d:'único', dx:-70, gap:-40 },
    { f:'Archivo Black', s:125, c:'c1', d:'detalhe', dx:-50, gap:-30 },
    { f:'Playfair Display', s:90, it:1, w:700, c:'c1', d:'pode fazer seu', dx:110, gap:-6 },
    { f:'Playfair Display', s:190, it:1, w:800, c:'c2', d:'vídeo', dx:50, gap:-46 } ]},
  { anim:'pop', lines:[
    { f:'Anton', s:300, c:'c2', d:'50%' },
    { f:'Bebas Neue', s:120, c:'c1', d:'DE DESCONTO', gap:-34 },
    { f:'Montserrat', s:46, it:1, w:400, c:'c1', d:'em toda a loja', gap:8 } ]},
  { anim:'typewriter', lines:[
    { f:'Montserrat', s:64, w:800, c:'c1', d:'pare de perder' },
    { f:'Caveat', s:175, w:700, c:'c2', rot:-4, d:'seguidores', gap:-26 },
    { f:'Montserrat', s:64, w:800, c:'c1', d:'fazendo isso', gap:-10 } ]}
];

function drawModel(c, model, t, escala, dy){
  c.save();
  c.translate(W / 2, H / 2 + (dy || 0));
  c.scale(escala, escala);
  c.translate(-W / 2, -H / 2);
  const lines = model.lines;
  const lineHs = lines.map(ln => ln.s * 1.12 + (ln.gap || 0));
  const totalH = lineHs.reduce((a, b) => a + b, 0);
  let y = H / 2 - totalH / 2;
  const n = lines.length;
  lines.forEach((ln, i) => {
    const lh = lineHs[i];
    const cy = y + lh / 2 + (ln.gap || 0) / 2;
    y += lh;
    const p = st(t, i, n, 0.18);
    if (p <= 0) return;
    c.save();
    c.translate(W / 2 + (ln.dx || 0), cy);
    if (ln.rot) c.rotate(ln.rot * Math.PI / 180);
    let alpha = 1, scale = 1, dy2 = 0, txt = ln.d;
    if (model.anim === 'fade'){ alpha = eo(p); }
    else if (model.anim === 'pop'){ scale = eb(p); alpha = Math.min(p * 3, 1); }
    else if (model.anim === 'slide'){ const e = eo(p); dy2 = (1 - e) * 70; alpha = e; }
    else if (model.anim === 'typewriter'){ txt = ln.d.slice(0, Math.ceil(ln.d.length * p)); }
    c.globalAlpha = alpha;
    c.translate(0, dy2);
    c.scale(scale, scale);
    c.font = (ln.it ? 'italic ' : '') + (ln.w || 400) + ' ' + ln.s + 'px "' + ln.f + '"';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    if ('letterSpacing' in c) c.letterSpacing = (ln.sp || 0) + 'px';
    c.fillStyle = P[ln.c];
    c.fillText(txt, 0, 0);
    c.restore();
  });
  c.restore();
}

const SCENES = [
  { a: 0, b: 3.0, draw: function(c, p){
    let q = st(p, 0, 3), o = pop(q);
    T(c, 'PARE', 660, { f:'Anton', size:280, color:'#00ffa3', alpha:o.alpha, scale:o.scale });
    q = st(p, 1, 3); o = pop(q);
    T(c, 'DE PERDER TEMPO', 880, { f:'Archivo Black', size:88, w:400, alpha:o.alpha, scale:o.scale });
    q = st(p, 2, 3); o = pop(q);
    T(c, 'procurando legendas', 1030, { f:'Playfair Display', it:1, w:800, size:98, color:'#00d9ff', alpha:o.alpha, scale:o.scale });
  }},
  { a: 3.0, b: 5.6, draw: function(c, p, t){
    const s = 0.92 + 0.08 * eo(clamp01(p * 2.5));
    const al = Math.min(p * 4, 1);
    const ring = (t % 1.2) / 1.2;
    c.save();
    c.globalAlpha = (1 - ring) * 0.5 * al;
    c.strokeStyle = '#00d9ff'; c.lineWidth = 4;
    c.beginPath(); c.arc(W / 2, 880, 230 + ring * 300, 0, 7); c.stroke();
    c.restore();
    c.save();
    c.translate(W / 2, 880); c.scale(s, s); c.globalAlpha = al;
    c.font = '800 150px "Montserrat"'; c.textBaseline = 'middle'; c.textAlign = 'left';
    const w1 = c.measureText('Legenda').width, w2 = c.measureText('Pro').width;
    c.fillStyle = '#fff'; c.fillText('Legenda', -(w1 + w2) / 2, 0);
    const g = c.createLinearGradient(-(w1 + w2) / 2 + w1, 0, (w1 + w2) / 2, 0);
    g.addColorStop(0, '#00d9ff'); g.addColorStop(1, '#00ffa3');
    c.fillStyle = g; c.fillText('Pro', -(w1 + w2) / 2 + w1, 0);
    c.restore();
    T(c, 'legendas dinâmicas prontas pro seu vídeo', 1020, { size:46, w:700, color:'#aab2bd', alpha:al });
  }},
  { a: 5.6, b: 12.2, draw: function(c, p, t){
    T(c, '34 MODELOS PRONTOS', 300, { size:56, sp:8, alpha:0.96 });
    T(c, 'edite o texto e as cores em segundos', 384, { size:40, w:400, color:'#8a93a0' });
    const seg = (t - 5.6) / 2.2;
    const idx = Math.min(2, Math.floor(seg));
    const at = clamp01((seg - idx) / 0.5);
    drawModel(c, MODELOS[idx], at, 0.78, 120);
    for (let i = 0; i < 3; i++){
      c.save();
      c.globalAlpha = i === idx ? 1 : 0.35;
      c.fillStyle = i === idx ? '#00d9ff' : '#5d6671';
      c.beginPath(); c.arc(W / 2 - 44 + i * 44, 1660, 10, 0, 7); c.fill();
      c.restore();
    }
  }},
  { a: 12.2, b: 17.2, draw: function(c, p, t){
    const lt = t - 12.2;
    T(c, 'SINCRONIZADO COM A FALA', 300, { size:50, sp:6, alpha:Math.min(p * 3, 1) });
    T(c, 'cada palavra entra no tempo certo, camada por camada', 380, { size:38, w:400, color:'#8a93a0', alpha:Math.min(p * 3, 1) });
    const words = [
      { s:'CADA', col:'#00ffa3', dx:-160, y:740 },
      { s:'PALAVRA', col:'#ffffff', dx:-30, y:865 },
      { s:'NO TEMPO', col:'#ffffff', dx:80, y:990 },
      { s:'DA FALA', col:'#00d9ff', dx:40, y:1115 }
    ];
    const enter = [0.5, 1.3, 2.1, 2.9];
    for (let i = 0; i < 4; i++){
      const w = words[i];
      const q = clamp01((lt - enter[i]) / 0.35);
      if (q <= 0) continue;
      const o = pop(q);
      T(c, w.s, w.y, { w:800, size:105, color:w.col, dx:w.dx, alpha:o.alpha, scale:o.scale });
      if (q < 1){
        c.save();
        c.globalAlpha = (1 - q) * 0.6;
        c.strokeStyle = w.col; c.lineWidth = 5;
        c.beginPath(); c.arc(W / 2 + w.dx, w.y, 80 + q * 170, 0, 7); c.stroke();
        c.restore();
        T(c, '♪', w.y - 95, { size:64, color:w.col, dx:w.dx + 185, alpha:1 - q, scale:1 + q * 0.6 });
      }
    }
    const wy = 1400;
    const playX = W / 2 - 360 + clamp01(lt / 4.4) * 720;
    for (let i = 0; i < 48; i++){
      const x = W / 2 - 360 + i * 15.3;
      const hgt = 18 + Math.abs(Math.sin(i * 0.9 + t * 6)) * 72 * (0.4 + 0.6 * Math.abs(Math.sin(i * 0.35 + 1)));
      c.fillStyle = x < playX ? '#00d9ff' : '#2a2f38';
      c.fillRect(x, wy - hgt / 2, 8, hgt);
    }
    const ty = 1530;
    for (let i = 0; i < 4; i++){
      const on = lt >= enter[i];
      const bx = W / 2 - 368 + i * 190, bw = 174, bh = 66;
      c.save();
      c.globalAlpha = on ? 1 : 0.35;
      c.fillStyle = on ? 'rgba(0,217,255,.22)' : '#14181f';
      c.strokeStyle = on ? '#00d9ff' : '#2a2f38'; c.lineWidth = 2.5;
      c.beginPath(); c.roundRect(bx, ty, bw, bh, 12); c.fill(); c.stroke();
      c.fillStyle = on ? '#00d9ff' : '#5d6671';
      c.font = '700 28px "Montserrat"'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(words[i].s.toLowerCase(), bx + bw / 2, ty + bh / 2 + 2);
      c.restore();
    }
    const cq = clamp01((lt - 3.6) / 0.4);
    if (cq > 0) T(c, '+ efeito sonoro em cada palavra', 1700, { size:42, w:700, color:'#00ffa3', alpha:eo(cq) });
  }},
  { a: 17.2, b: 20.7, draw: function(c, p){
    T(c, 'exporte e arraste', 500, { f:'Archivo Black', size:94, w:400, alpha:Math.min(p * 3, 1) });
    T(c, 'pro editor que você já usa', 600, { size:44, w:400, color:'#8a93a0', alpha:Math.min(p * 3, 1) });
    const eds = ['CapCut', 'Premiere Pro', 'DaVinci Resolve'];
    for (let i = 0; i < 3; i++){
      const q = st(p, i, 3, 0.22);
      if (q <= 0) continue;
      const ea = eo(q);
      c.save();
      c.globalAlpha = ea;
      c.translate(W / 2 + (1 - ea) * 520, 840 + i * 200);
      c.font = '800 64px "Montserrat"';
      const w = c.measureText(eds[i]).width;
      const bw = w + 270, bh = 144;
      c.fillStyle = '#14181f';
      c.strokeStyle = 'rgba(0,217,255,.5)'; c.lineWidth = 3;
      c.beginPath(); c.roundRect(-bw / 2, -bh / 2, bw, bh, 72); c.fill(); c.stroke();
      c.textAlign = 'left'; c.textBaseline = 'middle';
      c.fillStyle = '#00ffa3'; c.fillText('✓', -bw / 2 + 52, 4);
      c.fillStyle = '#fff'; c.fillText(eds[i], -bw / 2 + 134, 4);
      c.restore();
    }
    T(c, 'PNG transparente · vídeo animado · sequência com alfa', 1500, { size:35, w:400, color:'#8a93a0', alpha:Math.min(p * 2, 1) });
  }},
  { a: 20.7, b: 25.5, draw: function(c, p){
    let q = st(p, 0, 3, 0.25), o = pop(q);
    if (q > 0){
      c.save();
      c.translate(W / 2, 620); c.rotate(-2 * Math.PI / 180); c.scale(o.scale, o.scale); c.globalAlpha = o.alpha;
      c.font = '800 60px "Montserrat"';
      const s = 'TESTE GRÁTIS POR 1 DIA';
      const w = c.measureText(s).width;
      c.fillStyle = '#fff';
      c.beginPath(); c.roundRect(-w / 2 - 44, -72, w + 88, 144, 18); c.fill();
      c.fillStyle = '#0a1418'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(s, 0, 4);
      c.restore();
    }
    q = st(p, 1, 3, 0.25);
    T(c, 'depois só', 820, { size:46, w:400, color:'#8a93a0', alpha:eo(q) });
    q = st(p, 2, 3, 0.25); o = pop(q);
    T(c, 'R$ 37,99', 1050, { f:'Anton', size:300, color:'grad', alpha:o.alpha, scale:o.scale });
    T(c, 'por mês · menos de R$ 1,30 por dia', 1260, { size:44, w:700, alpha:o.alpha });
    T(c, 'cancele quando quiser', 1340, { size:36, w:400, color:'#8a93a0', alpha:o.alpha });
  }},
  { a: 25.5, b: 30, draw: function(c, p, t){
    const o = pop(clamp01(p * 2));
    T(c, 'CRIE SUA CONTA', 680, { f:'Archivo Black', size:108, w:400, alpha:o.alpha, scale:o.scale });
    T(c, 'e teste agora de graça', 790, { size:46, w:400, color:'#8a93a0', alpha:o.alpha });
    if (o.scale > 0){
      const pulse = 1 + 0.02 * Math.sin(t * 5);
      c.save();
      c.translate(W / 2, 1010); c.scale(pulse * o.scale, pulse * o.scale); c.globalAlpha = o.alpha;
      c.font = '800 58px "Montserrat"';
      const u = 'legendapro.vercel.app';
      const w = c.measureText(u).width;
      const g = c.createLinearGradient(-w / 2, 0, w / 2, 0);
      g.addColorStop(0, '#00d9ff'); g.addColorStop(1, '#00ffa3');
      c.fillStyle = g;
      c.beginPath(); c.roundRect(-w / 2 - 52, -76, w + 104, 152, 22); c.fill();
      c.fillStyle = '#04151c'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(u, 0, 4);
      c.restore();
    }
    T(c, 'sem cartão de crédito', 1170, { size:38, w:400, color:'#8a93a0', alpha:o.alpha });
    T(c, 'LINK NA BIO', 1440, { size:50, sp:8, color:'#00ffa3', alpha:(Math.sin(t * 4) * 0.3 + 0.7) * o.alpha });
  }}
];

function drawAt(t){
  bgGlow(ctx, t);
  for (const s of SCENES){
    if (t >= s.a && t < s.b){
      s.draw(ctx, (t - s.a) / (s.b - s.a), t);
    }
  }
}
window.scrub = drawAt;

let raf = null;
function play(){
  if (raf) cancelAnimationFrame(raf);
  const start = performance.now();
  function tick(now){
    const t = (now - start) / 1000;
    drawAt(Math.min(t, DUR - 0.01));
    if (t < DUR) raf = requestAnimationFrame(tick);
  }
  raf = requestAnimationFrame(tick);
}

function gravar(kind, btnId){
  const btn = document.getElementById(btnId);
  const mimes = kind === 'mp4'
    ? ['video/mp4;codecs=avc1.42E01E', 'video/mp4;codecs=avc1', 'video/mp4']
    : ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
  const mime = mimes.find(m => MediaRecorder.isTypeSupported(m));
  if (!mime){ setStatus('Seu navegador não exporta ' + kind.toUpperCase() + ' — tente o outro formato.'); return; }
  if (raf) cancelAnimationFrame(raf);
  btn.disabled = true;
  const rec = new MediaRecorder(cv.captureStream(30), { mimeType: mime, videoBitsPerSecond: 12000000 });
  const chunks = [];
  rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  rec.onstop = () => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(chunks, { type: mime.split(';')[0] }));
    a.download = 'legendapro-anuncio-30s.' + kind;
    a.click();
    setStatus('Vídeo baixado! Joga no CapCut pra adicionar a música e publica. 🚀');
    btn.disabled = false;
  };
  rec.start();
  const start = performance.now();
  function tick(now){
    const t = (now - start) / 1000;
    setStatus('Gravando... ' + Math.min(30, Math.ceil(t)) + 's / 30s (deixe a aba aberta)');
    drawAt(Math.min(t, DUR - 0.01));
    if (t < DUR + 0.2) requestAnimationFrame(tick);
    else rec.stop();
  }
  requestAnimationFrame(tick);
}

function setStatus(m){ document.getElementById('status').textContent = m; }

document.getElementById('btnPlay').addEventListener('click', play);
document.getElementById('btnMp4').addEventListener('click', () => gravar('mp4', 'btnMp4'));
document.getElementById('btnWebm').addEventListener('click', () => gravar('webm', 'btnWebm'));

const FONT_LOADS = [
  '92px "Archivo Black"', 'italic 800 92px "Playfair Display"', 'italic 700 92px "Playfair Display"',
  '92px "Anton"', '92px "Bebas Neue"', '700 92px "Caveat"',
  '400 92px "Montserrat"', '700 92px "Montserrat"', '800 92px "Montserrat"', 'italic 400 92px "Montserrat"'
];
Promise.all(FONT_LOADS.map(f => document.fonts.load(f))).then(play);
</script>
</body>
</html>
