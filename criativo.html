<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criativo Épico — LegendaPro (uso interno)</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,700;1,800&family=Caveat:wght@700&family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; background: #0a0b0e; color: #f0f0f2; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 18px; }
h1 { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
h1 span { color: #00d9ff; }
.sub { font-size: 12px; color: #9a9aa3; margin-bottom: 14px; text-align: center; }
canvas { height: min(72vh, 760px); aspect-ratio: 9/16; border-radius: 14px; background: #08090c; display: block; }
.bar { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
button { font-family: inherit; font-weight: 800; font-size: 14px; border: none; border-radius: 10px; padding: 12px 18px; cursor: pointer; }
button:disabled { opacity: .5; cursor: wait; }
.b1 { background: #2a2a31; color: #fff; }
.b2 { background: linear-gradient(90deg,#00d9ff,#00ffa3); color: #04151c; }
#status { font-size: 13px; color: #9a9aa3; margin-top: 10px; min-height: 18px; text-align: center; }
</style>
</head>
<body>
<h1>Criativo Épico — <span>LegendaPro</span> (30s)</h1>
<p class="sub">Uso interno. Adicione música/trend no CapCut antes de publicar nas redes.</p>
<canvas id="cv" width="1080" height="1920"></canvas>
<div class="bar">
  <button class="b1" id="btnPlay">&#9654; Assistir</button>
  <button class="b2" id="btnMp4">&#9210; Baixar MP4</button>
  <button class="b1" id="btnWebm">Baixar WebM</button>
</div>
<p id="status"></p>

<script>
const W=1080,H=1920,DUR=30;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

function clamp01(x){ return Math.max(0,Math.min(1,x)); }
function eo(t){ return 1-Math.pow(1-t,2); }
function eb(t){ const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
function st(p,i,n,s){ s=s||0.18; return clamp01(p*(1+(n-1)*s)-i*s); }
function pop(q){ return {alpha:Math.min(q*3,1),scale:q<=0?0:eb(q)}; }

// Particle system
const pts=[];
function spawnPts(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=3+Math.random()*9;
    pts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:1,
      dec:0.018+Math.random()*0.04,sz:3+Math.random()*9,
      col:col||(Math.random()<0.5?'#00d9ff':'#00ffa3')});
  }
}
function tickPts(){
  for(let i=pts.length-1;i>=0;i--){
    const p=pts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=p.dec;
    if(p.life<=0) pts.splice(i,1);
  }
}
function drawPts(c){
  for(const p of pts){
    c.save(); c.globalAlpha=p.life; c.fillStyle=p.col;
    c.beginPath(); c.arc(p.x,p.y,p.sz*p.life,0,7); c.fill(); c.restore();
  }
}

// Text helper
function T(c,s,y,o){
  o=o||{};
  if((o.alpha!==undefined&&o.alpha<=0)||o.scale===0) return;
  c.save();
  c.translate(W/2+(o.dx||0),y);
  if(o.rot) c.rotate(o.rot*Math.PI/180);
  c.globalAlpha=o.alpha===undefined?1:o.alpha;
  const sc=o.scale===undefined?1:o.scale; c.scale(sc,sc);
  const size=o.size||60;
  c.font=(o.it?'italic ':'')+((o.w||800)+' ')+size+'px "'+(o.f||'Montserrat')+'"';
  c.textAlign='center'; c.textBaseline='middle';
  if('letterSpacing' in c) c.letterSpacing=(o.sp||0)+'px';
  if(o.glow){ c.shadowColor=o.glow; c.shadowBlur=o.gbl||40; }
  if(o.color==='grad'){
    const m=c.measureText(s);
    const g=c.createLinearGradient(-m.width/2,0,m.width/2,0);
    g.addColorStop(0,'#00d9ff'); g.addColorStop(1,'#00ffa3'); c.fillStyle=g;
  } else { c.fillStyle=o.color||'#ffffff'; }
  c.fillText(s,0,0); c.restore();
}

// Glitch text (chromatic aberration)
function Tg(c,s,y,o,intensity){
  if(intensity>0&&Math.random()<intensity){
    T(c,s,y+1,{...o,dx:(o.dx||0)-4,color:'rgba(255,0,60,0.75)',glow:null,alpha:(o.alpha||1)*0.85});
    T(c,s,y-1,{...o,dx:(o.dx||0)+4,color:'rgba(0,255,200,0.75)',glow:null,alpha:(o.alpha||1)*0.85});
  }
  T(c,s,y,o);
}

// Scanlines
function scan(c,a){
  c.save(); c.globalAlpha=a;
  for(let y=0;y<H;y+=4){ c.fillStyle='rgba(0,0,0,0.32)'; c.fillRect(0,y,W,2); }
  c.restore();
}

// Neon line
function nln(c,x1,y1,x2,y2,col,w,bl){
  c.save(); c.shadowColor=col; c.shadowBlur=bl||20;
  c.strokeStyle=col; c.lineWidth=w||3;
  c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke(); c.restore();
}

// Background — animated orbs
function bg(c,t,sc){
  sc=sc||1;
  c.clearRect(0,0,W,H); c.fillStyle='#08090c'; c.fillRect(0,0,W,H);
  let g=c.createRadialGradient(W*.82+Math.sin(t*.4)*110,260+Math.cos(t*.3)*130,0,W*.82,260,960);
  g.addColorStop(0,'rgba(0,217,255,'+(0.17*sc)+')'); g.addColorStop(1,'rgba(0,217,255,0)');
  c.fillStyle=g; c.fillRect(0,0,W,H);
  g=c.createRadialGradient(W*.14+Math.cos(t*.35)*70,H-340+Math.sin(t*.45)*90,0,W*.14,H-340,840);
  g.addColorStop(0,'rgba(0,255,163,'+(0.13*sc)+')'); g.addColorStop(1,'rgba(0,255,163,0)');
  c.fillStyle=g; c.fillRect(0,0,W,H);
  if(sc>1.1){
    const pulse=0.5+0.5*Math.sin(t*7);
    g=c.createRadialGradient(W/2,H/2,0,W/2,H/2,700);
    g.addColorStop(0,'rgba(255,40,60,'+(pulse*0.12*(sc-1.1)/0.9)+')'); g.addColorStop(1,'rgba(255,40,60,0)');
    c.fillStyle=g; c.fillRect(0,0,W,H);
  }
}

// === CENAS ===
const SCENES=[

  // CENA 1 (0–4s): HOOK — dor do editor
  {a:0,b:4,draw(c,p,t){
    // shake decrescente
    const sh=p<0.25?(0.25-p)/0.25*14:0;
    const sx=Math.sin(t*42)*sh, sy=Math.cos(t*39)*sh*.5;

    // pulso vermelho de fundo
    const pulse=0.5+0.5*Math.sin(t*6);
    const g=c.createRadialGradient(W/2,H/2,0,W/2,H/2,750);
    g.addColorStop(0,'rgba(200,0,40,'+(pulse*0.13)+')'); g.addColorStop(1,'rgba(200,0,40,0)');
    c.fillStyle=g; c.fillRect(0,0,W,H);

    const q0=st(p,0,3,.26),o0=pop(q0);
    if(q0>0){
      c.save(); c.translate(sx,sy);
      T(c,'VOCÊ AINDA',530,{f:'Archivo Black',size:86,color:'#c0c7d0',alpha:o0.alpha,scale:o0.scale});
      c.restore();
    }
    const q1=st(p,1,3,.26),o1=pop(q1);
    if(q1>0){
      c.save(); c.translate(sx*.5,sy*.5);
      Tg(c,'DESPERDIÇA',678,{f:'Anton',size:196,color:'#ff2840',glow:'#ff2840',gbl:50,alpha:o1.alpha,scale:o1.scale},.4);
      c.restore();
      if(q1>.1&&q1<.85) spawnPts(W/2+Math.random()*200-100,678,2,'#ff2840');
    }
    const q2=st(p,2,3,.26),o2=pop(q2);
    if(q2>0){
      c.save(); c.translate(-sx*.3,-sy*.3);
      T(c,'HORAS COM LEGENDA?',855,{f:'Archivo Black',size:76,alpha:o2.alpha,scale:o2.scale});
      c.restore();
    }
    if(p>.68){
      const fa=eo(clamp01((p-.68)/.32));
      T(c,'enquanto profissionais fazem em 30 segundos',1010,{size:42,w:500,color:'#8a93a0',alpha:fa});
    }
    tickPts(); drawPts(c); scan(c,.05);
  }},

  // CENA 2 (4–8s): REVEAL — LegendaPro épico
  {a:4,b:8,draw(c,p,t){
    const lt=t-4;
    // anéis de explosão
    for(let r=0;r<3;r++){
      const rd=clamp01((lt-r*.15)/.7);
      if(rd>0&&rd<1){
        c.save(); c.globalAlpha=(1-rd)*.65;
        c.strokeStyle=r%2===0?'#00d9ff':'#00ffa3'; c.lineWidth=4-r;
        c.shadowColor=r%2===0?'#00d9ff':'#00ffa3'; c.shadowBlur=20;
        c.beginPath(); c.arc(W/2,H*.44,80+rd*520,0,7); c.stroke(); c.restore();
      }
    }
    const sc2=0.86+0.14*eo(clamp01(p*2));
    const al=eo(clamp01(p*2.8));
    c.save();
    c.translate(W/2,H*.43); c.scale(sc2,sc2); c.globalAlpha=al;
    c.font='800 158px "Montserrat"'; c.textBaseline='middle'; c.textAlign='left';
    const w1=c.measureText('Legenda').width, w2=c.measureText('Pro').width;
    c.shadowColor='#00d9ff'; c.shadowBlur=35;
    c.fillStyle='#fff'; c.fillText('Legenda',-(w1+w2)/2,0);
    const grd=c.createLinearGradient(-(w1+w2)/2+w1,0,(w1+w2)/2,0);
    grd.addColorStop(0,'#00d9ff'); grd.addColorStop(1,'#00ffa3');
    c.fillStyle=grd; c.fillText('Pro',-(w1+w2)/2+w1,0);
    c.restore();
    if(al>.5) spawnPts(W/2+Math.random()*160-80,H*.43,1,Math.random()<.5?'#00d9ff':'#00ffa3');
    T(c,'legendas dinâmicas pro seu vídeo',H*.43+120,{size:46,w:400,color:'#aab2bd',alpha:eo(clamp01((p-.18)*3.5))});
    const la=eo(clamp01((p-.4)*3));
    if(la>0) nln(c,W/2-320,H*.43+190,W/2+320,H*.43+190,'#00d9ff',2,18);
    // chips de feature
    const chips=['90+ modelos','16 fontes','SRT sync','CapCut ✓'];
    chips.forEach((ch,i)=>{
      const qa=eo(clamp01((p-.48-i*.1)*4)); if(qa<=0) return;
      const cx=W/2-290+i*194, cy=H*.43+370;
      c.save(); c.globalAlpha=qa;
      c.fillStyle='rgba(0,217,255,0.1)'; c.strokeStyle='rgba(0,217,255,0.5)'; c.lineWidth=1.5;
      c.beginPath(); c.roundRect(cx-80,cy-22,160,44,22); c.fill(); c.stroke();
      c.font='600 27px "Montserrat"'; c.textAlign='center'; c.textBaseline='middle';
      c.fillStyle='#00d9ff'; c.fillText(ch,cx,cy+1); c.restore();
    });
    tickPts(); drawPts(c); scan(c,.03);
  }},

  // CENA 3 (8–14s): DEMO — modelos ciclando rápido
  {a:8,b:14,draw(c,p,t){
    const lt=t-8;
    T(c,'90+ ESTILOS PRONTOS',298,{f:'Archivo Black',size:66,sp:4,alpha:Math.min(p*5,1)});
    T(c,'edite texto, cor e fonte em segundos',386,{size:40,w:400,color:'#8a93a0',alpha:Math.min(p*5,1)});
    const DM=[
      {lines:[
        {f:'Anton',s:215,c:'#00d9ff',d:'VIRAL',glow:'#00d9ff'},
        {f:'Archivo Black',s:88,c:'#fff',d:'desde ontem'},
        {f:'Montserrat',s:50,c:'#00ffa3',d:'seu conteúdo em chamas 🔥',w:700}
      ],anim:'pop'},
      {lines:[
        {f:'Playfair Display',s:86,c:'#fff',d:'esse',it:1,w:800,dx:190},
        {f:'Playfair Display',s:195,c:'#00ffa3',d:'único',it:1,w:800,dx:-80,gap:-34},
        {f:'Archivo Black',s:118,c:'#fff',d:'detalhe',dx:-55,gap:-26}
      ],anim:'slide'},
      {lines:[
        {f:'Bebas Neue',s:330,c:'grad',d:'50%'},
        {f:'Montserrat',s:70,c:'#fff',d:'MAIS VIEWS',w:800,gap:-28},
        {f:'Caveat',s:58,c:'#aab2bd',d:'com legenda dinâmica',w:700,gap:12}
      ],anim:'fade'},
      {lines:[
        {f:'Anton',s:156,c:'#ff2840',d:'NÃO'},
        {f:'Archivo Black',s:88,c:'#fff',d:'perde mais tempo',gap:-18},
        {f:'Montserrat',s:56,c:'#00d9ff',d:'faça em segundos',w:800,gap:10}
      ],anim:'pop'}
    ];
    const SEG=6/DM.length, idx=Math.min(DM.length-1,Math.floor(lt/SEG));
    const lp=clamp01((lt-idx*SEG)/SEG), model=DM[idx];
    const lines=model.lines;
    const lHs=lines.map(ln=>ln.s*1.1+(ln.gap||0));
    const totH=lHs.reduce((a,b)=>a+b,0);
    let yy=H/2-totH/2+110;
    lines.forEach((ln,i)=>{
      const lh=lHs[i], cy=yy+lh/2+(ln.gap||0)/2; yy+=lh;
      const llp=st(lp,i,lines.length,.2); if(llp<=0) return;
      let alpha=1,scale=1,dy2=0;
      if(model.anim==='fade'){ alpha=eo(llp); }
      else if(model.anim==='pop'){ const o=pop(llp); scale=o.scale; alpha=o.alpha; }
      else if(model.anim==='slide'){ const e=eo(llp); dy2=(1-e)*80; alpha=e; }
      c.save(); c.translate(W/2+(ln.dx||0),cy+dy2); c.globalAlpha=alpha; c.scale(scale,scale);
      if(ln.glow){ c.shadowColor=ln.glow; c.shadowBlur=40; }
      c.font=(ln.it?'italic ':'')+((ln.w||800)+' ')+ln.s+'px "'+(ln.f||'Montserrat')+'"';
      c.textAlign='center'; c.textBaseline='middle';
      if(ln.c==='grad'){
        const m=c.measureText(ln.d);
        const g=c.createLinearGradient(-m.width/2,0,m.width/2,0);
        g.addColorStop(0,'#00d9ff'); g.addColorStop(1,'#00ffa3'); c.fillStyle=g;
      } else { c.fillStyle=ln.c||'#fff'; }
      c.fillText(ln.d,0,0); c.restore();
    });
    // dots de progresso
    for(let i=0;i<DM.length;i++){
      c.save(); c.globalAlpha=i===idx?1:.28;
      c.fillStyle=i===idx?'#00d9ff':'#3a3f4a';
      c.shadowColor='#00d9ff'; c.shadowBlur=i===idx?16:0;
      c.beginPath(); c.arc(W/2-56+i*38,1648,i===idx?13:8,0,7); c.fill(); c.restore();
    }
    // flash de transição
    if(lp>.86){ const fa=(lp-.86)/.14; c.save(); c.globalAlpha=fa*.18; c.fillStyle='#fff'; c.fillRect(0,0,W,H); c.restore(); }
    scan(c,.03);
  }},

  // CENA 4 (14–18s): COMPATIBILIDADE — editores
  {a:14,b:18,draw(c,p,t){
    T(c,'FUNCIONA NO SEU EDITOR',298,{f:'Archivo Black',size:62,sp:2,alpha:eo(Math.min(p*3.5,1))});
    T(c,'sem plugin. sem instalação.',386,{size:40,w:400,color:'#8a93a0',alpha:eo(Math.min(p*3.5,1))});
    const eds=[
      {n:'CapCut',d:'WebM animado',c:'#00ffa3'},
      {n:'Premiere Pro',d:'MP4 chroma key',c:'#00d9ff'},
      {n:'DaVinci Resolve',d:'PNG transparente',c:'#a78bfa'}
    ];
    eds.forEach((e,i)=>{
      const q=st(p,i,3,.22); if(q<=0) return;
      const ea=eo(q);
      c.save(); c.globalAlpha=ea; c.translate(W/2+(1-ea)*460,790+i*212);
      const bw=820,bh=155;
      c.shadowColor=e.c; c.shadowBlur=ea>.8?22:0;
      c.fillStyle='rgba(255,255,255,0.04)'; c.strokeStyle=e.c; c.lineWidth=2;
      c.beginPath(); c.roundRect(-bw/2,-bh/2,bw,bh,16); c.fill(); c.stroke();
      c.shadowBlur=0;
      c.font='bold 50px "Montserrat"'; c.textAlign='left'; c.textBaseline='middle';
      c.fillStyle=e.c; c.fillText('✓',-bw/2+42,0);
      c.fillStyle='#fff'; c.font='800 54px "Montserrat"'; c.fillText(e.n,-bw/2+118,0);
      c.fillStyle='rgba(170,178,189,0.88)'; c.font='500 33px "Montserrat"'; c.fillText(e.d,-bw/2+118,42);
      c.restore();
    });
    if(p>.78){
      const fa=eo(clamp01((p-.78)/.22));
      T(c,'1 clique → arquivo pronto pra usar',1470,{size:44,w:700,color:'#00ffa3',alpha:fa,glow:'#00ffa3',gbl:28});
    }
    scan(c,.02);
  }},

  // CENA 5 (18–23s): ESCASSEZ — urgência máxima
  {a:18,b:23,draw(c,p,t){
    const lt=t-18;
    const o0=pop(clamp01(lt/.32));
    if(o0.alpha>0){
      c.save(); c.translate(W/2,415); c.rotate(-3*Math.PI/180); c.scale(o0.scale,o0.scale); c.globalAlpha=o0.alpha;
      c.shadowColor='#ff2840'; c.shadowBlur=50;
      c.fillStyle='#ff2840';
      c.beginPath(); c.roundRect(-290,-62,580,124,18); c.fill();
      c.shadowBlur=0; c.fillStyle='#fff';
      c.font='800 62px "Montserrat"'; c.textAlign='center'; c.textBaseline='middle';
      c.fillText('⚠  ATENÇÃO',0,3); c.restore();
    }
    const q1=pop(clamp01((lt-.42)/.38));
    if(q1.alpha>0){
      const shakeMag=q1.alpha>.9&&lt<1.2?Math.sin(lt*30)*5:0;
      c.save(); c.translate(shakeMag,0);
      Tg(c,'ÚLTIMAS',650,{f:'Anton',size:256,color:'#fff',glow:'#fff',gbl:30,alpha:q1.alpha,scale:q1.scale},.38);
      c.restore();
    }
    const q2=pop(clamp01((lt-.76)/.38));
    if(q2.alpha>0){
      T(c,'VAGAS',820,{f:'Anton',size:345,color:'grad',alpha:q2.alpha,scale:q2.scale,glow:'#00ffa3',gbl:40});
      if(q2.alpha>.7) spawnPts(W/2+Math.random()*300-150,820,2,Math.random()<.5?'#00d9ff':'#00ffa3');
    }
    const q3=pop(clamp01((lt-1.2)/.44));
    if(q3.alpha>0)
      T(c,'do teste grátis por 1 dia',1075,{f:'Archivo Black',size:66,alpha:q3.alpha,scale:q3.scale});
    // barra de progresso / vagas
    const q4=clamp01((lt-1.9)/.7);
    if(q4>0){
      const filled=Math.round(38+8*eo(q4));
      const pct=filled/50;
      const bx=W/2-400,by=1215,bw2=800,bh=26;
      c.save(); c.globalAlpha=eo(q4);
      c.fillStyle='rgba(255,255,255,0.1)'; c.beginPath(); c.roundRect(bx,by,bw2,bh,13); c.fill();
      const gb=c.createLinearGradient(bx,0,bx+bw2,0);
      gb.addColorStop(0,'#ff2840'); gb.addColorStop(1,'#ff8c00');
      c.fillStyle=gb; c.beginPath(); c.roundRect(bx,by,bw2*pct,bh,13); c.fill();
      c.restore();
      T(c,filled+' de 50 vagas preenchidas',1292,{size:40,w:700,color:'#ff8060',alpha:eo(q4)});
    }
    if(lt>2.7)
      T(c,'quando fechar não abriremos tão cedo',1390,{size:37,w:400,color:'#9a9aa3',alpha:eo(clamp01((lt-2.7)/.5))});
    tickPts(); drawPts(c); scan(c,.06);
  }},

  // CENA 6 (23–26.5s): PREÇO / proposta de valor
  {a:23,b:26.5,draw(c,p,t){
    const o0=pop(st(p,0,3,.26));
    if(o0.alpha>0){
      c.save(); c.translate(W/2,565); c.rotate(-2*Math.PI/180); c.scale(o0.scale,o0.scale); c.globalAlpha=o0.alpha;
      c.shadowColor='#fff'; c.shadowBlur=22; c.fillStyle='#fff';
      const s2='TESTE GRÁTIS — 1 DIA';
      c.font='800 58px "Montserrat"';
      const tw=c.measureText(s2).width;
      c.beginPath(); c.roundRect(-tw/2-46,-70,tw+92,140,18); c.fill();
      c.shadowBlur=0; c.fillStyle='#0a1418'; c.textAlign='center'; c.textBaseline='middle';
      c.fillText(s2,0,3); c.restore();
    }
    T(c,'depois apenas',765,{size:46,w:400,color:'#8a93a0',alpha:eo(st(p,1,3,.26))});
    const o2=pop(st(p,2,3,.26));
    T(c,'R$ 37,99',1030,{f:'Anton',size:275,color:'grad',alpha:o2.alpha,scale:o2.scale,glow:'#00d9ff',gbl:35});
    T(c,'por mês · menos de R$ 1,30/dia',1225,{size:44,w:700,alpha:o2.alpha});
    T(c,'cancele quando quiser · sem fidelidade',1308,{size:34,w:400,color:'#8a93a0',alpha:o2.alpha});
    scan(c,.02);
  }},

  // CENA 7 (26.5–30s): CTA ÉPICO
  {a:26.5,b:30,draw(c,p,t){
    const lt=t-26.5;
    if(lt<.35) spawnPts(W/2,H/2,3,Math.random()<.5?'#00d9ff':'#00ffa3');
    const o=pop(clamp01(p*2.6));
    T(c,'CRIE SUA CONTA',640,{f:'Archivo Black',size:106,alpha:o.alpha,scale:o.scale,glow:'#00d9ff',gbl:35});
    T(c,'e teste agora de graça',748,{size:47,w:400,color:'#8a93a0',alpha:o.alpha});
    if(o.scale>0){
      const pulse=1+.026*Math.sin(t*5.2);
      const url='legendapro.vercel.app';
      c.save(); c.translate(W/2,1005); c.scale(pulse*o.scale,pulse*o.scale); c.globalAlpha=o.alpha;
      c.font='800 57px "Montserrat"';
      const uw=c.measureText(url).width;
      const grd=c.createLinearGradient(-uw/2,0,uw/2,0);
      grd.addColorStop(0,'#00d9ff'); grd.addColorStop(1,'#00ffa3');
      c.shadowColor='#00d9ff'; c.shadowBlur=40*(0.5+0.5*Math.sin(t*4));
      c.fillStyle=grd;
      c.beginPath(); c.roundRect(-uw/2-54,-78,uw+108,156,24); c.fill();
      c.shadowBlur=0; c.fillStyle='#04151c'; c.textAlign='center'; c.textBaseline='middle';
      c.fillText(url,0,4); c.restore();
      // anéis pulsantes ao redor do botão
      for(let r=0;r<2;r++){
        const ph=(t*.7+r*.55)%1;
        c.save(); c.globalAlpha=(1-ph)*.42*o.alpha;
        c.strokeStyle='#00d9ff'; c.lineWidth=2.5;
        c.shadowColor='#00d9ff'; c.shadowBlur=12;
        const bw2=uw+108+ph*220,bh2=156+ph*110;
        c.beginPath(); c.roundRect(W/2-bw2/2,1005-bh2/2,bw2,bh2,24+ph*32); c.stroke(); c.restore();
      }
    }
    T(c,'sem cartão de crédito',1183,{size:38,w:400,color:'#8a93a0',alpha:o.alpha});
    nln(c,W/2-320,1136,W/2+320,1136,'rgba(0,217,255,0.28)',1.5,8);
    // LINK NA BIO piscando
    const lb=(0.62+0.38*Math.sin(t*5.4))*o.alpha;
    T(c,'LINK NA BIO 👇',1460,{size:58,sp:6,color:'#00ffa3',alpha:lb,glow:'#00ffa3',gbl:25});
    tickPts(); drawPts(c); scan(c,.03);
  }}
];

function drawAt(t){
  const inScar=t>=18&&t<23;
  bg(ctx,t,inScar?1.6:1);
  for(const s of SCENES){
    if(t>=s.a&&t<s.b) s.draw(ctx,(t-s.a)/(s.b-s.a),t);
  }
}
window.scrub=drawAt;

let raf=null;
function play(){
  if(raf) cancelAnimationFrame(raf);
  pts.length=0;
  const start=performance.now();
  function tick(now){
    const t=(now-start)/1000;
    drawAt(Math.min(t,DUR-.01));
    if(t<DUR) raf=requestAnimationFrame(tick);
  }
  raf=requestAnimationFrame(tick);
}

function setStatus(m){ document.getElementById('status').textContent=m; }

function gravar(kind,btnId){
  const btn=document.getElementById(btnId);
  const mimes=kind==='mp4'
    ?['video/mp4;codecs=avc1.42E01E','video/mp4;codecs=avc1','video/mp4']
    :['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  const mime=mimes.find(m=>MediaRecorder.isTypeSupported(m));
  if(!mime){ setStatus('Seu navegador não exporta '+kind.toUpperCase()+' — tente o outro formato.'); return; }
  if(raf) cancelAnimationFrame(raf);
  pts.length=0; btn.disabled=true;
  const rec=new MediaRecorder(cv.captureStream(30),{mimeType:mime,videoBitsPerSecond:12000000});
  const chunks=[];
  rec.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };
  rec.onstop=()=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(chunks,{type:mime.split(';')[0]}));
    a.download='legendapro-criativo-30s.'+kind; a.click();
    setStatus('Vídeo baixado! Adicione música/trend no CapCut e publique nas redes. 🚀');
    btn.disabled=false;
  };
  rec.start();
  const start=performance.now();
  function tick(now){
    const t=(now-start)/1000;
    setStatus('Gravando... '+Math.min(30,Math.ceil(t))+'s / 30s (mantenha a aba aberta)');
    drawAt(Math.min(t,DUR-.01));
    if(t<DUR+.22) requestAnimationFrame(tick);
    else rec.stop();
  }
  requestAnimationFrame(tick);
}

document.getElementById('btnPlay').addEventListener('click',play);
document.getElementById('btnMp4').addEventListener('click',()=>gravar('mp4','btnMp4'));
document.getElementById('btnWebm').addEventListener('click',()=>gravar('webm','btnWebm'));

const FONT_LOADS=[
  '92px "Archivo Black"','italic 800 92px "Playfair Display"',
  '92px "Anton"','92px "Bebas Neue"','700 92px "Caveat"',
  '400 92px "Montserrat"','600 92px "Montserrat"','700 92px "Montserrat"','800 92px "Montserrat"'
];
Promise.all(FONT_LOADS.map(f=>document.fonts.load(f))).then(play);
</script>
